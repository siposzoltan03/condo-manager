# What Prometheus scrapes and how often. Targets use compose service names,
# resolved on the monitoring network.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus # Prometheus scraping itself
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node # host vitals (CPU, RAM, disk, net)
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor # per-container metrics
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: condo-app # the app's own /api/metrics (prom-client)
    metrics_path: /api/metrics
    static_configs:
      # The app binds to the host's 127.0.0.1:3000; reach the host from inside
      # the monitoring network via host.docker.internal (see extra_hosts).
      - targets: ["host.docker.internal:3000"]
