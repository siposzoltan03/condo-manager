# What Prometheus scrapes and how often. Targets use compose service names,
# resolved on the monitoring network.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

# Where to send firing alerts. Alertmanager runs in this same compose project,
# reachable by service name on the monitoring network.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus # Prometheus scraping itself
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node # host vitals (CPU, RAM, disk, net)
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor # per-container metrics
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: condo-app # the app's own /api/metrics (prom-client)
    metrics_path: /api/metrics
    static_configs:
      # Prometheus joins the app's network (appnet), so it reaches the app
      # container directly by service name — the app listens on 0.0.0.0:3000
      # inside its container (the 127.0.0.1 bind only restricts the host port).
      - targets: ["app:3000"]
