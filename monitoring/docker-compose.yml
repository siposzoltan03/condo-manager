# Observability stack for the home server — runs as its own compose project,
# separate from the app stack (independent lifecycle). cAdvisor + node-exporter
# expose metrics; Prometheus scrapes & stores them; Grafana visualizes.
# Everything binds to 127.0.0.1; reach Grafana via Tailscale or an SSH tunnel.
services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d # keep 15 days of history
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - default # monitoring network (node-exporter, cadvisor, grafana)
      - appnet # the app's network, to scrape the app container directly

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file: [.env] # GRAFANA_ADMIN_PASSWORD, GF_SERVER_ROOT_URL
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000" # Grafana's internal port is 3000; expose on 3001
    depends_on: [prometheus]

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host # see the host's processes, not just the container's
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave # read the host filesystem for disk metrics
    # No published port — Prometheus scrapes it at node-exporter:9100 on the
    # compose network.

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    # Scraped at cadvisor:8080 on the compose network.

  # Loki: stores & queries logs (what Prometheus is for metrics). The image
  # ships a working single-node config; we just persist its data.
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - lokidata:/loki
    ports:
      - "127.0.0.1:3100:3100" # localhost only (for verification/queries)

  # Alloy: tails every container's stdout/stderr via the Docker socket and
  # pushes the lines to Loki. No app changes needed — it ships what containers
  # already print.
  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    user: root # needs to read the Docker socket (root:docker)
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloydata:/var/lib/alloy/data
    ports:
      - "127.0.0.1:12345:12345" # Alloy's own UI (localhost only)
    depends_on: [loki]

volumes:
  promdata:
  grafanadata:
  lokidata:
  alloydata:

networks:
  default: {} # this monitoring project's own network
  appnet: # the app stack's network, joined so Prometheus can reach the app
    external: true
    name: condo-manager_default
