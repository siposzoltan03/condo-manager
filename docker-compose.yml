# Development only — do NOT use this compose file in production.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Override the localhost-based .env values (those are for host `npm run dev`).
    # Inside the Compose network, services are reached by SERVICE NAME, not
    # localhost — and Redis listens on its real port 6379 (6380 is only the
    # host-side mapping). `environment:` wins over `env_file:` for the same key.
    environment:
      DATABASE_URL: postgresql://condo:condo_secret@db:5432/condo_manager?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
      # Auth.js v5 refuses to resolve sessions for an "untrusted" host in
      # production (dev trusts automatically). Self-hosting behind our own
      # proxy (nginx / Tailscale), the host IS trustworthy, so opt in.
      # Required on the server too (where the host is the tailnet name).
      AUTH_TRUST_HOST: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    # Same in-network overrides as `app` (see note above).
    environment:
      DATABASE_URL: postgresql://condo:condo_secret@db:5432/condo_manager?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: condo
      POSTGRES_PASSWORD: condo_secret
      POSTGRES_DB: condo_manager
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condo -d condo_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

  mailhog:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  uploads:
